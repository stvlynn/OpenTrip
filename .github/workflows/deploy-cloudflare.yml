# Deploy OpenTrip to Cloudflare on push to main.
# - Pages (SPA) → opentrip.im / opentrip-web.pages.dev
# - Workers (API) → api.opentrip.im  (requires Hyperdrive id in wrangler.api.jsonc)
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Optional (synced to Worker on each API deploy when present):
#   BETTER_AUTH_SECRET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
#   AI_API_KEY, OPENWEATHERMAP_API_KEY, GOOGLE_CLIENT_ID,
#   GOOGLE_CLIENT_SECRET, GOOGLE_MAPS_API_KEY, CAPTCHA_SECRET_KEY

name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy API Worker (requires Hyperdrive)"
        type: boolean
        default: true
      deploy_web:
        description: "Deploy Pages frontend"
        type: boolean
        default: true
      sync_secrets:
        description: "Sync GitHub secrets → Worker secrets before API deploy"
        type: boolean
        default: true

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-web:
    name: Pages (opentrip-web)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_ORIGIN: https://api.opentrip.im
          PAGES_BRANCH: main
        run: node deploy/cloudflare/scripts/deploy-web.mjs

  deploy-api:
    name: Workers (opentrip-api)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps (wrangler bundle needs package resolution)
        run: pnpm install --frozen-lockfile

      - name: Check Hyperdrive configuration
        id: hyperdrive
        run: |
          set -euo pipefail
          id=$(node -e '
            const fs = require("fs");
            const s = fs.readFileSync("deploy/cloudflare/wrangler.api.jsonc", "utf8");
            const m = s.match(/"binding"\s*:\s*"HYPERDRIVE"\s*,\s*"id"\s*:\s*"([^"]+)"/);
            const id = m?.[1] ?? "";
            process.stdout.write(id);
          ')
          echo "id=$id" >> "$GITHUB_OUTPUT"
          if [[ -z "$id" || "$id" == \<* || "$id" == *your-hyperdrive* ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Hyperdrive id is not set in wrangler.api.jsonc — skipping API deploy. Create Hyperdrive, run set-hyperdrive.mjs, commit, and re-push."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Hyperdrive id is set ($id)"
          fi

      - name: Deploy API Worker
        if: steps.hyperdrive.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node deploy/cloudflare/scripts/deploy-api.mjs

      - name: Sync Worker secrets from GitHub secrets
        if: >-
          steps.hyperdrive.outputs.configured == 'true' &&
          (github.event_name == 'push' || inputs.sync_secrets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          CAPTCHA_SECRET_KEY: ${{ secrets.CAPTCHA_SECRET_KEY }}
        run: node deploy/cloudflare/scripts/sync-secrets.mjs --from-env
